<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EchoBound - Detector Móvil (v24h)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1) contrast(1.5); z-index: -1; }
        .radar-active { border-color: #ff0000 !important; box-shadow: 0 0 30px #ff0000; color: #ff0000; }
        
        /* Sombra original circular */
        #shadow { position: fixed; width: 150px; height: 150px; background-color: rgba(0, 0, 0, 0.6); border-radius: 50%; filter: blur(25px); z-index: 5; display: none; pointer-events: none; }
        
        /* ESTILO PARA EL ROSTRO FANTASMAL (DE image_5.png) */
        #ghost-face {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            max-width: 80%;
            max-height: 80%;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 2s ease-in-out, transform 3s ease-out;
            filter: grayscale(0.5) contrast(1.2) brightness(0.9);
        }
        
        /* Clase que se aplica para mostrarlo */
        #ghost-face.show {
            opacity: 0.7;
            transform: translate(-50%, -50%) scale(1);
        }
        
        /* Estilo para los logs en el móvil */
        #logs div { border-bottom: 1px solid #003300; padding: 2px 0; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-center p-4">

    <video id="video" autoplay playsinline muted></video> <div id="shadow"></div>
    
    <img id="ghost-face" src="rostro.png" alt="Manifestación Espectral">

    <button id="btn-help" class="absolute top-5 right-5 w-10 h-10 border border-green-500 rounded-full font-bold z-50 hover:bg-green-900">?</button>

    <div id="help-modal" class="hidden absolute inset-0 bg-black/95 z-40 p-6 flex flex-col justify-center text-left">
        <h2 class="text-xl font-bold text-center mb-4 border-b border-green-500 pb-2">ANATOMÍA DE ECHOBOUND (Móvil)</h2>
        <div class="space-y-4 text-sm font-mono">
            <p><strong>1. Capa de Sensores:</strong> Magnetómetro, LiDAR y audio de alta sensibilidad.</p>
            <p><strong>2. Procesamiento (IA Local):</strong> Algoritmos activos 24/7.</p>
            <p><strong>3. Manifestación:</strong> Responde a la palabra clave 'Pericot' tras 10s.</p>
        </div>
        <button onclick="document.getElementById('help-modal').style.display='none'" class="mt-8 w-full py-3 border border-green-500 hover:bg-green-900 font-bold uppercase">CERRAR</button>
    </div>

    <h1 class="text-3xl font-bold mb-4 mt-12">ECHOBOUND SCANNER</h1>
    <div id="radar" class="w-64 h-64 border-4 border-green-500 rounded-full flex items-center justify-center mb-6 transition-all">
        <span id="emf-value" class="text-3xl font-bold">0.00 μT</span>
    </div>

    <button id="btn" class="bg-green-900 border border-green-500 px-10 py-4 text-xl font-bold z-10 w-full max-w-sm">INICIAR ESCANEO</button>
    <div id="logs" class="mt-4 text-xs h-32 overflow-y-auto w-full max-w-sm border-t border-green-900 pt-2 bg-black/50 text-left px-2"></div>

    <script>
        const btn = document.getElementById('btn');
        const shadow = document.getElementById('shadow');
        const ghostFace = document.getElementById('ghost-face');
        const logs = document.getElementById('logs');
        const video = document.getElementById('video');
        let scanning = false, stream = null, timer = null;
        
        let recognition = null;
        let ghostTimeout = null;

        function addLog(message, type = 'info') {
            const date = new Date().toLocaleTimeString();
            let color = '#00ff41';
            if (type === 'error') color = '#ff3333';
            if (type === 'warn') color = '#ffff33';
            if (type === 'crit') color = '#ff0000';
            
            logs.innerHTML = `<div style="color: ${color}">[${date}] ${message}</div>` + logs.innerHTML;
        }

        function moverSombra() {
            if (!scanning) return;

            const puntos = [
                { x: -200, y: Math.random() * window.innerHeight },
                { x: window.innerWidth + 200, y: Math.random() * window.innerHeight },
                { x: Math.random() * window.innerWidth, y: -200 },
                { x: Math.random() * window.innerWidth, y: window.innerHeight + 200 }
            ];

            let inicio = puntos[Math.floor(Math.random() * puntos.length)];
            let destino = puntos[Math.floor(Math.random() * puntos.length)];
            
            while(inicio === destino) destino = puntos[Math.floor(Math.random() * puntos.length)];

            shadow.style.transition = "none";
            shadow.style.display = 'block';
            shadow.style.left = inicio.x + 'px';
            shadow.style.top = inicio.y + 'px';

            setTimeout(() => {
                shadow.style.transition = `all ${4 + Math.random() * 4}s linear`;
                shadow.style.left = destino.x + 'px';
                shadow.style.top = destino.y + 'px';
            }, 50);

            setTimeout(() => {
                shadow.style.display = 'none';
                setTimeout(moverSombra, 8000 + Math.random() * 12000);
            }, 8000);
        }

        function iniciarReconocimientoVoz() {
            // Comprobar compatibilidad específica para móviles
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                addLog('ERROR: Detección de voz no compatible con este navegador móvil.', 'error');
                addLog('Usa Chrome en Android o Safari en iOS actualizado.', 'warn');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                const result = event.results[event.results.length - 1];
                if (!result.isFinal) return; // Ignorar resultados intermedios
                
                const transcript = result[0].transcript.trim().toLowerCase();
                
                addLog(`VOZ: Procesando audio...`);

                if (transcript.includes('pericot')) {
                    addLog(`SISTEMA: Palabra clave 'Pericot' detectada.`, 'warn');
                    activarEventoFantasma();
                }
            };

            recognition.onerror = (event) => {
                console.error("Error de reconocimiento:", event.error);
                // Si el error es 'no-speech' o 'network', intentamos reiniciar sutilmente
                if (scanning && (event.error === 'no-speech' || event.error === 'network')) {
                    addLog('VOZ: Reajustando sensores de audio...', 'info');
                    try { recognition.stop(); } catch(e){} // Asegurar parada
                    // El onend se encargará de reiniciar
                } else if (scanning) {
                    addLog(`VOZ: Error crítico (${event.error}). Reiniciando...`, 'error');
                }
            };

            recognition.onend = () => {
                // Reiniciar automáticamente mientras escaneamos
                if (scanning) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            try {
                recognition.start();
                addLog(`SISTEMA: Detección de audio activa 24h. Di 'Pericot'.`);
            } catch(e) {
                addLog('ERROR: No se pudo iniciar el micrófono. Revisa los permisos HTTPS.', 'error');
                console.error(e);
            }
        }

        function activarEventoFantasma() {
            if (ghostTimeout) clearTimeout(ghostTimeout);

            addLog(`ALERTA: Anomalía Pericot programada (T-10s).`, 'warn');

            // Esperar 10 segundos
            ghostTimeout = setTimeout(() => {
                if (!scanning) return;

                addLog(`CRÍTICO: Manifestación visual detectada.`, 'crit');
                
                // Mostrar el rostro (image_5.png)
                if (ghostFace) {
                    ghostFace.classList.add('show');
                } else {
                    addLog('ERROR: Imagen rostro.png no encontrada.', 'error');
                }

                // Ocultarlo después de 5 segundos
                setTimeout(() => {
                    if (ghostFace) {
                        ghostFace.classList.remove('show');
                    }
                }, 5000);

            }, 10000); // 10 segundos
        }

        document.getElementById('btn-help').addEventListener('click', () => {
            document.getElementById('help-modal').style.display = 'flex';
        });

        btn.addEventListener('click', async () => {
            if (!scanning) {
                try {
                    // Pedir permisos explicitamente en el móvil
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { exact: "environment" } }, 
                        audio: true 
                    });
                    video.srcObject = stream;
                    
                    // Asegurar autoplay en móviles
                    video.play().catch(e => addLog('CÁMARA: Permiso de video diferido.', 'warn'));
                    
                    btn.innerText = "DETENER ESCANEO";
                    scanning = true;
                    
                    // Iniciar sombra original
                    moverSombra();
                    
                    // Iniciar detección de voz
                    iniciarReconocimientoVoz();
                    
                    timer = setInterval(() => {
                        const base = 35; 
                        const val = (base + Math.random() * 15).toFixed(2);
                        
                        document.getElementById('emf-value').innerText = `${val} μT`;
                        
                        if(val > 38) {
                            document.getElementById('radar').classList.add('radar-active');
                            logs.innerHTML = `<div style="color: #00ff41">[${new Date().toLocaleTimeString()}] ANOMALÍA: ${val} μT</div>` + logs.innerHTML;
                        } else {
                            document.getElementById('radar').classList.remove('radar-active');
                        }
                    }, 1000);
                } catch (e) { 
                    addLog(`ERROR: Cámara/Micrófono denegados o HTTPS requerido.`, 'error');
                    console.error(e);
                }
            } else {
                if (stream) stream.getTracks().forEach(t => t.stop());
                if (video) video.srcObject = null;
                
                clearInterval(timer);
                
                if (recognition) {
                    try { recognition.stop(); } catch(e){}
                }
                if (ghostTimeout) clearTimeout(ghostTimeout);

<video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover -z-10 opacity-30" style="filter: invert(1) grayscale(1)"></video>

<script>
    async function startMedia() {
        try {
            // Acceso a Cámara
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video').srcObject = stream;
            
            // Configurar análisis de audio
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            
            // Bucle de detección de "psicofonías"
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = dataArray.reduce((a, b) => a + b);
                if (sum > 5000) { // Umbral de "ruido"
                    const log = document.createElement('div');
                    log.innerText = `[${new Date().toLocaleTimeString()}] PICO DE FRECUENCIA DETECTADO`;
                    document.body.appendChild(log);
                }
            }, 1000);
            
        } catch (err) {
            console.error("Error al acceder a sensores:", err);
        }
    }
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EchoBound Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1); z-index: -1; }
        #ghost-face {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            max-width: 80%; opacity: 0; z-index: 10; pointer-events: none;
            transition: opacity 2s ease-in-out;
        }
        #ghost-face.show { opacity: 0.7; }
        #logs { font-size: 10px; color: #00ff41; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-4">

    <video id="video" autoplay playsinline muted></video>
    <img id="ghost-face" src="rostro.png">

    <h1 class="text-2xl font-bold mb-4">ECHOBOUND SCANNER</h1>
    
    <div id="radar" class="w-48 h-48 border-4 border-green-500 rounded-full flex items-center justify-center mb-6">
        <span id="emf-value" class="text-2xl font-bold">0.00 μT</span>
    </div>

    <button id="btn" class="bg-green-900 border border-green-500 px-8 py-4 text-xl font-bold z-50 active:bg-green-700">
        INICIAR ESCANEO
    </button>

    <div id="logs" class="mt-4 h-32 overflow-y-auto w-full border-t border-green-900 p-2">
        <div>[SISTEMA] Listo para iniciar...</div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const video = document.getElementById('video');
        const logs = document.getElementById('logs');
        const ghostFace = document.getElementById('ghost-face');
        let scanning = false;
        let recognition = null;

        function addLog(msg, color = "#00ff41") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.insertBefore(div, logs.firstChild);
        }

        async function startApp() {
            try {
                addLog("Solicitando permisos...");
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                video.srcObject = stream;
                await video.play();
                
                scanning = true;
                btn.innerText = "DETENER ESCANEO";
                addLog("Cámara y Micro activos.");
                
                iniciarVoz();
                iniciarEMF();

            } catch (err) {
                addLog("ERROR: " + err.name, "#ff3333");
                alert("Debes permitir el acceso a la cámara y micro.");
            }
        }

        function iniciarVoz() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return addLog("Voz no soportada", "#ff3333");

            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                if (text.includes("pericot")) {
                    addLog("PALABRA DETECTADA: Pericot", "#ffff00");
                    setTimeout(() => {
                        if (scanning) {
                            addLog("MANIFESTACIÓN DETECTADA", "#ff0000");
                            ghostFace.classList.add('show');
                            setTimeout(() => ghostFace.classList.remove('show'), 5000);
                        }
                    }, 10000);
                }
            };

            recognition.onend = () => { if(scanning) recognition.start(); };
            recognition.start();
            addLog("Escuchando palabra clave...");
        }

        function iniciarEMF() {
            setInterval(() => {
                if(!scanning) return;
                const val = (35 + Math.random() * 15).toFixed(2);
                document.getElementById('emf-value').innerText = val + " μT";
            }, 1000);
        }

        btn.addEventListener('click', () => {
            if (!scanning) {
                startApp();
            } else {
                location.reload(); // Forma más limpia de detener todo en móvil
            }
        });
    </script>
</body>
</html>

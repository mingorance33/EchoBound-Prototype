<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoBound - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; }
        .radar { border: 3px solid #00ff41; border-radius: 50%; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; transition: border-color 0.3s; }
        .alert { border-color: #ff0000 !important; color: #ff0000; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen space-y-8">

    <h1 class="text-3xl font-bold tracking-widest">ECHOBOUND</h1>

    <div class="radar" id="radar">
        <span id="emf-value" class="text-2xl font-bold">0.00 μT</span>
    </div>

    <button onclick="toggleScan()" id="scan-btn" class="bg-green-900 border-2 border-green-500 px-12 py-6 text-xl font-bold hover:bg-green-800 transition-all">
        INICIAR ESCANEO
    </button>

    <script>
        let scanning = false;
        let interval;

        function toggleScan() {
            const btn = document.getElementById('scan-btn');
            const radar = document.getElementById('radar');
            
            scanning = !scanning;
            btn.innerText = scanning ? "DETENER ESCANEO" : "INICIAR ESCANEO";
            
            if (scanning) {
                interval = setInterval(() => {
                    const reading = (Math.random() * 50).toFixed(2);
                    document.getElementById('emf-value').innerText = `${reading} μT`;
                    
                    // Efecto de alerta si supera 30
                    if (reading > 30) {
                        radar.classList.add('alert');
                    } else {
                        radar.classList.remove('alert');
                    }
                }, 500);
            } else {
                clearInterval(interval);
                radar.classList.remove('alert');
            }
        }
    </script>
</body>
</html>

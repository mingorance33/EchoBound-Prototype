<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoBound - Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
        }
        
        #video { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.3; 
            filter: grayscale(1) contrast(1.5); 
            z-index: -1; 
        }

        /* Configuración para la imagen del rostro */
        #shadow { 
            position: fixed; 
            width: 250px; 
            height: 250px; 
            background-image: url('rostro.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* El blur y la opacidad baja le dan el toque fantasmal */
            filter: blur(15px) grayscale(1); 
            opacity: 0.6;
            z-index: 5; 
            display: none; 
            pointer-events: none; 
        }

        .radar-active { 
            border-color: #ff0000 !important; 
            box-shadow: 0 0 30px #ff0000; 
            color: #ff0000; 
        }

        #logs::-webkit-scrollbar {
            width: 5px;
        }
        #logs::-webkit-scrollbar-thumb {
            background: #004411;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-center">

    <video id="video" autoplay playsinline></video>
    <div id="shadow"></div>

    <button id="btn-help" class="absolute top-5 right-5 w-10 h-10 border border-green-500 rounded-full font-bold z-50 hover:bg-green-900">?</button>

    <div id="help-modal" class="hidden absolute inset-0 bg-black/95 z-40 p-6 flex flex-col justify-center text-left">
        <h2 class="text-xl font-bold text-center mb-4 border-b border-green-500 pb-2">ANATOMÍA DE ECHOBOUND</h2>
        <div class="space-y-4 text-sm font-mono">
            <p><strong>1. Capa de Sensores:</strong> Magnetómetro, LiDAR y audio de alta sensibilidad.</p>
            <p><strong>2. Procesamiento (IA Local):</strong> Algoritmos de redes neuronales convolucionales.</p>
            <p><strong>3. Contexto (API):</strong> Integración con registros históricos y geolocalización.</p>
        </div>
        <button onclick="document.getElementById('help-modal').classList.add('hidden')" class="mt-8 w-full py-3 border border-green-500 hover:bg-green-900 font-bold uppercase">CERRAR</button>
    </div>

    <h1 class="text-3xl font-bold mb-4">ECHOBOUND SCANNER</h1>
    
    <div id="radar" class="w-64 h-64 border-4 border-green-500 rounded-full flex items-center justify-center mb-6 transition-all duration-300">
        <span id="emf-value" class="text-3xl font-bold">0.00 μT</span>
    </div>

    <button id="btn" class="bg-green-900 border border-green-500 px-10 py-4 text-xl font-bold z-10 active:scale-95 transition-transform">
        INICIAR ESCANEO
    </button>
    
    <div id="logs" class="mt-4 text-[10px] h-24 overflow-y-auto w-80 border-t border-green-900 pt-2 bg-black/50 text-left px-2"></div>

    <script>
        const btn = document.getElementById('btn');
        const shadow = document.getElementById('shadow');
        const logs = document.getElementById('logs');
        const video = document.getElementById('video');
        
        let scanning = false, stream = null, timer = null;
        let config = { horaInicio: 21.0, horaFin: 21.05 }; // Valores de tu config.json

        async function cargarConfig() {
            try {
                const response = await fetch('config.json');
                if (response.ok) config = await response.json();
            } catch (e) { 
                console.log("Error cargando config.json, usando valores por defecto."); 
            }
        }
        cargarConfig();

        function esHorarioActivo() {
            const ahora = new Date();
            const horaDecimal = ahora.getHours() + (ahora.getMinutes() / 60);
            return horaDecimal >= config.horaInicio && horaDecimal <= config.horaFin;
        }

        function moverSombra() {
            if (!scanning || !esHorarioActivo()) {
                shadow.style.display = 'none';
                return;
            }

            const puntos = [
                { x: -300, y: Math.random() * window.innerHeight },
                { x: window.innerWidth + 300, y: Math.random() * window.innerHeight },
                { x: Math.random() * window.innerWidth, y: -300 },
                { x: Math.random() * window.innerWidth, y: window.innerHeight + 300 }
            ];

            let inicio = puntos[Math.floor(Math.random() * puntos.length)];
            let destino = puntos[Math.floor(Math.random() * puntos.length)];
            
            while(inicio === destino) destino = puntos[Math.floor(Math.random() * puntos.length)];

            shadow.style.transition = "none";
            shadow.style.display = 'block';
            shadow.style.left = inicio.x + 'px';
            shadow.style.top = inicio.y + 'px';

            setTimeout(() => {
                const duracion = 5 + Math.random() * 5;
                shadow.style.transition = `all ${duracion}s linear`;
                shadow.style.left = destino.x + 'px';
                shadow.style.top = destino.y + 'px';
            }, 50);

            setTimeout(() => {
                shadow.style.display = 'none';
                if(scanning) setTimeout(moverSombra, 5000 + Math.random() * 10000);
            }, 10000); 
        }

        document.getElementById('btn-help').addEventListener('click', () => {
            document.getElementById('help-modal').classList.remove('hidden');
        });

        btn.addEventListener('click', async () => {
            if (!scanning) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: true 
                    });
                    video.srcObject = stream;
                    btn.innerText = "DETENER ESCANEO";
                    scanning = true;
                    
                    // Iniciar aparición de la imagen
                    moverSombra();
                    
                    timer = setInterval(() => {
                        const activo = esHorarioActivo();
                        const base = activo ? 35 : 5;
                        const val = (base + Math.random() * 15).toFixed(2);
                        
                        document.getElementById('emf-value').innerText = `${val} μT`;
                        
                        if(activo && val > 38) {
                            document.getElementById('radar').classList.add('radar-active');
                            const time = new Date().toLocaleTimeString();
                            logs.innerHTML = `<div class="text-red-500">[${time}] ANOMALÍA DETECTADA: ${val} μT</div>` + logs.innerHTML;
                        } else {
                            document.getElementById('radar').classList.remove('radar-active');
                        }
                    }, 1000);
                } catch (e) { 
                    alert("Se requiere acceso a la cámara y audio para operar el escáner."); 
                }
            } else {
                if (stream) stream.getTracks().forEach(t => t.stop());
                clearInterval(timer);
                btn.innerText = "INICIAR ESCANEO";
                scanning = false;
                shadow.style.display = 'none';
            }
        });
    </script>
</body>
</html>

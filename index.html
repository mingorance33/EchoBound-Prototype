<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoBound</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1) contrast(1.5); z-index: -1; }
        .radar-active { border-color: #ff0000 !important; box-shadow: 0 0 30px #ff0000; color: #ff0000; }
        #hidden-canvas { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-start h-screen pt-10">

    <video id="video" autoplay playsinline></video>
    <canvas id="hidden-canvas" width="50" height="50"></canvas>

    <div class="flex gap-4 z-10 mb-8">
        <button id="btn-scan" class="bg-black/80 border-2 border-green-500 px-6 py-3 font-bold hover:bg-green-900 transition-all">INICIAR</button>
        <button id="btn-save" class="bg-black/80 border-2 border-blue-500 px-6 py-3 font-bold hover:bg-blue-900 transition-all text-blue-400">MARCAR LUGAR</button>
    </div>

    <div id="radar" class="w-64 h-64 border-4 border-green-500 rounded-full flex flex-col items-center justify-center transition-all duration-300 bg-black/40 backdrop-blur-sm">
        <span id="emf-value" class="text-4xl font-bold">0.00 <span class="text-xl">μT</span></span>
    </div>

    <div id="logs" class="mt-8 text-xs h-32 overflow-y-auto w-80 border border-green-900 p-2 bg-black/70"></div>

    <script>
        const btnScan = document.getElementById('btn-scan');
        const btnSave = document.getElementById('btn-save');
        const video = document.getElementById('video');
        const emfDisplay = document.getElementById('emf-value');
        const radar = document.getElementById('radar');
        const logs = document.getElementById('logs');
        
        let scanning = false;
        let interval, currentStream;

        function getVisualFingerprint() {
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 50, 50);
            const data = ctx.getImageData(0, 0, 50, 50).data;
            let r=0, g=0, b=0;
            for(let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
            return { r: r/2500, g: g/2500, b: b/2500 };
        }

        btnSave.addEventListener('click', () => {
            const memory = { fingerprint: getVisualFingerprint(), timestamp: Date.now() };
            localStorage.setItem('echoBound_memory', JSON.stringify(memory));
            logs.innerHTML = '> Punto de resonancia anclado.<br>' + logs.innerHTML;
        });

        btnScan.addEventListener('click', async () => {
            if (!scanning) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    currentStream = stream;
                    video.srcObject = stream;
                    scanning = true;
                    btnScan.innerText = "DETENER";

                    interval = setInterval(() => {
                        const memory = JSON.parse(localStorage.getItem('echoBound_memory'));
                        let isResonant = false;

                        if (memory && (Date.now() - memory.timestamp < 300000)) {
                            const current = getVisualFingerprint();
                            const diff = Math.abs(current.r - memory.fingerprint.r) + Math.abs(current.g - memory.fingerprint.g) + Math.abs(current.b - memory.fingerprint.b);
                            isResonant = (diff < 20);
                        }

                        const base = isResonant ? 35 : 10;
                        const val = (base + Math.random() * 15).toFixed(2);
                        emfDisplay.innerHTML = `${val} <span class="text-xl">μT</span>`;

                        if(val > 38) {
                            radar.classList.add('radar-active');
                            if (navigator.vibrate) navigator.vibrate(100);
                        } else {
                            radar.classList.remove('radar-active');
                        }
                    }, 800);
                } catch (e) { alert("Acceso a cámara denegado."); }
            } else {
                currentStream.getTracks().forEach(t => t.stop());
                clearInterval(interval);
                scanning = false;
                btnScan.innerText = "INICIAR";
                radar.classList.remove('radar-active');
            }
        });
    </script>
</body>
</html>

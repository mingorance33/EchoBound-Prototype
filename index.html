<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EchoBound Scanner - Ultra Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; filter: grayscale(1); z-index: -1; }
        #ghost-face {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            max-width: 85%; opacity: 0; z-index: 10; pointer-events: none;
            transition: opacity 0.5s ease-in-out; /* Aparición muy rápida para test */
            filter: grayscale(0.5) contrast(1.3) brightness(1.1);
        }
        #ghost-face.show { opacity: 0.8; }
        #logs { font-size: 11px; color: #00ff41; background: rgba(0,0,0,0.85); border: 1px solid #004400; }
        .radar-active { border-color: #ff0000 !important; color: #ff0000; box-shadow: 0 0 25px #ff0000; }
        .listening-dot { width: 8px; height: 8px; background: #00ff41; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-4 text-center">

    <video id="video" autoplay playsinline muted></video>
    <!-- Imagen del rostro (debe llamarse rostro.png) -->
    <img id="ghost-face" src="rostro.png" alt="Manifestación">

    <h1 class="text-2xl font-bold mb-2 mt-4 tracking-widest">ECHOBOUND SCANNER</h1>
    
    <div id="radar" class="w-48 h-48 border-4 border-green-500 rounded-full flex flex-col items-center justify-center mb-6 transition-all">
        <span id="emf-value" class="text-3xl font-bold">0.00</span>
        <span class="text-xs">μT</span>
    </div>

    <button id="btn" class="bg-green-900 border-2 border-green-500 px-8 py-5 text-xl font-bold z-50 active:bg-green-700 w-full max-w-xs rounded-lg shadow-lg">
        INICIAR ESCANEO
    </button>

    <div id="logs" class="mt-4 h-40 overflow-y-auto w-full max-w-xs p-2 text-left rounded">
        <div class="text-yellow-500 underline mb-1">REGISTRO DE ACTIVIDAD:</div>
        <div id="log-content"></div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const video = document.getElementById('video');
        const logContent = document.getElementById('log-content');
        const ghostFace = document.getElementById('ghost-face');
        const radar = document.getElementById('radar');
        const emfValue = document.getElementById('emf-value');
        
        let scanning = false;
        let stream = null;
        let recognition = null;
        let emfInterval = null;

        function addLog(msg, color = "#00ff41") {
            const div = document.createElement('div');
            div.style.color = color;
            div.style.marginBottom = "2px";
            div.innerHTML = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
            logContent.insertBefore(div, logContent.firstChild);
        }

        async function iniciarSistema() {
            try {
                addLog("Iniciando sensores secuenciales...");
                
                // 1. Cámara
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                await video.play();
                addLog("Sensor VISUAL: OK");

                // 2. Micrófono
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioStream.getAudioTracks().forEach(track => stream.addTrack(track));
                addLog("Sensor AUDIO: OK");

                scanning = true;
                btn.innerText = "DETENER";
                btn.classList.replace('bg-green-900', 'bg-red-900');
                btn.classList.replace('border-green-500', 'border-red-500');

                iniciarEscuchaVoz();
                iniciarSimulacionEMF();

            } catch (err) {
                addLog("ERROR: " + err.name, "#ff3333");
                alert("Permisos denegados. Recarga y permite cámara/micro.");
                scanning = false;
                btn.innerText = "REINTENTAR";
            }
        }

        function iniciarEscuchaVoz() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                addLog("ERROR: Navegador no compatible con VOZ.", "#ff3333");
                return;
            }

            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                addLog('<span class="listening-dot"></span> ESCUCHANDO...', "#00ff41");
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                
                // ESTO ES PARA DEPURAR: Ver lo que entiende el móvil
                addLog(`AUDIO CAPTADO: "${transcript}"`, "#aaaaaa");

                // Lógica de activación flexible (Peric...)
                if (transcript.includes("peric") || transcript.includes("pelic") || transcript.includes("pericó")) {
                    activarSusto();
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') addLog("MICRO BLOQUEADO POR NAVEGADOR", "#ff3333");
                console.error("Error Speech:", event.error);
            };

            recognition.onend = () => {
                if (scanning) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            try {
                recognition.start();
            } catch(e) {
                addLog("Error al arrancar escucha.", "#ff3333");
            }
        }

        function activarSusto() {
            addLog("!! ANOMALÍA DETECTADA !!", "#ff0000");
            ghostFace.classList.add('show');
            
            // Vibración si el móvil lo permite
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

            setTimeout(() => {
                ghostFace.classList.remove('show');
            }, 4000);
        }

        function iniciarSimulacionEMF() {
            emfInterval = setInterval(() => {
                if(!scanning) return;
                const val = (35 + Math.random() * 20).toFixed(2);
                emfValue.innerText = val;
                
                if (val > 45) {
                    radar.classList.add('radar-active');
                } else {
                    radar.classList.remove('radar-active');
                }
            }, 800);
        }

        btn.addEventListener('click', () => {
            if (!scanning) {
                iniciarSistema();
            } else {
                location.reload(); 
            }
        });
    </script>
</body>
</html>

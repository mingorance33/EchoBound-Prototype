<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoBound - Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1) contrast(1.5); z-index: -1; }
        .radar-active { border-color: #ff0000 !important; box-shadow: 0 0 30px #ff0000; color: #ff0000; }
        #shadow { position: fixed; width: 150px; height: 150px; background-color: rgba(0, 0, 0, 0.6); border-radius: 50%; filter: blur(25px); z-index: 5; display: none; pointer-events: none; }
        
        /* --- NUEVO: ESTILOS PARA EL EFECTO DE PANTALLA ROTA (GLITCH) --- */
        @keyframes glitch-anim {
            0% { filter: invert(0) hue-rotate(0deg); transform: translate(0, 0); }
            20% { filter: invert(1) hue-rotate(90deg) contrast(2); transform: translate(-10px, 5px); }
            40% { filter: invert(0) hue-rotate(180deg); transform: translate(10px, -5px); }
            60% { filter: invert(1) hue-rotate(270deg) contrast(3); transform: translate(-10px, -5px); }
            80% { filter: invert(0) hue-rotate(360deg); transform: translate(10px, 5px); }
            100% { filter: invert(1) hue-rotate(0deg); transform: translate(0, 0); }
        }
        
        .glitch-active {
            animation: glitch-anim 0.15s infinite; /* Animación súper rápida y epiléptica */
        }

        /* Capa de ruido de estática de TV que se activa con el glitch */
        .glitch-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .glitch-active .glitch-noise {
            opacity: 0.5;
            animation: flicker 0.1s infinite;
        }
        
        @keyframes flicker { 0% { opacity: 0.2; } 50% { opacity: 0.7; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-center">

    <div class="glitch-noise"></div>

    <video id="video" autoplay playsinline></video>
    <div id="shadow"></div>

    <button id="btn-help" class="absolute top-5 right-5 w-10 h-10 border border-green-500 rounded-full font-bold z-50 hover:bg-green-900">?</button>

    <div id="help-modal" class="hidden absolute inset-0 bg-black/95 z-40 p-6 flex flex-col justify-center text-left">
        <h2 class="text-xl font-bold text-center mb-4 border-b border-green-500 pb-2">ANATOMÍA DE ECHOBOUND</h2>
        <div class="space-y-4 text-sm font-mono">
            <p><strong>1. Capa de Sensores:</strong> Magnetómetro, LiDAR y audio de alta sensibilidad.</p>
            <p><strong>2. Procesamiento (IA Local):</strong> Algoritmos de redes neuronales convolucionales.</p>
            <p><strong>3. Contexto (API):</strong> Integración con registros históricos y geolocalización.</p>
        </div>
        <button onclick="document.getElementById('help-modal').style.display='none'" class="mt-8 w-full py-3 border border-green-500 hover:bg-green-900 font-bold uppercase">CERRAR</button>
    </div>

    <h1 class="text-3xl font-bold mb-4">ECHOBOUND SCANNER</h1>
    <div id="radar" class="w-64 h-64 border-4 border-green-500 rounded-full flex items-center justify-center mb-6 transition-all">
        <span id="emf-value" class="text-3xl font-bold">0.00 μT</span>
    </div>

    <button id="btn" class="bg-green-900 border border-green-500 px-10 py-4 text-xl font-bold z-10">INICIAR ESCANEO</button>
    <div id="logs" class="mt-4 text-xs h-24 overflow-y-auto w-80 border-t border-green-900 pt-2 bg-black/50"></div>

    <script>
        const btn = document.getElementById('btn');
        const shadow = document.getElementById('shadow');
        const logs = document.getElementById('logs');
        const video = document.getElementById('video');
        
        // Añadimos una variable para controlar el temporizador del fallo
        let scanning = false, stream = null, timer = null, glitchTimeout = null;
        
        // Valores por defecto incluyendo la nueva opción
        let config = { horaInicio: 0, horaFin: 24, mostrarSombras: true }; 

        // Cargar configuración externa
        async function cargarConfig() {
            try {
                const response = await fetch('config.json');
                if (response.ok) {
                    config = await response.json();
                    console.log("Configuración cargada:", config);
                }
            } catch (e) { 
                console.log("Usando configuración local por defecto."); 
            }
        }
        cargarConfig();

        function esHorarioActivo() {
            const ahora = new Date();
            const horaDecimal = ahora.getHours() + (ahora.getMinutes() / 60);
            return horaDecimal >= config.horaInicio && horaDecimal <= config.horaFin;
        }

        function moverSombra() {
            if (!scanning || !esHorarioActivo() || config.mostrarSombras === false) {
                shadow.style.display = 'none';
                return;
            }

            const puntos = [
                { x: -200, y: Math.random() * window.innerHeight },
                { x: window.innerWidth + 200, y: Math.random() * window.innerHeight },
                { x: Math.random() * window.innerWidth, y: -200 },
                { x: Math.random() * window.innerWidth, y: window.innerHeight + 200 }
            ];

            let inicio = puntos[Math.floor(Math.random() * puntos.length)];
            let destino = puntos[Math.floor(Math.random() * puntos.length)];
            
            while(inicio === destino) destino = puntos[Math.floor(Math.random() * puntos.length)];

            shadow.style.transition = "none";
            shadow.style.display = 'block';
            shadow.style.left = inicio.x + 'px';
            shadow.style.top = inicio.y + 'px';

            setTimeout(() => {
                shadow.style.transition = `all ${4 + Math.random() * 4}s linear`;
                shadow.style.left = destino.x + 'px';
                shadow.style.top = destino.y + 'px';
            }, 50);

            setTimeout(() => {
                shadow.style.display = 'none';
                if (scanning) {
                    setTimeout(moverSombra, 8000 + Math.random() * 12000);
                }
            }, 8000);
        }

        document.getElementById('btn-help').addEventListener('click', () => {
            document.getElementById('help-modal').style.display = 'flex';
        });

        btn.addEventListener('click', async () => {
            if (!scanning) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { exact: "environment" } }, 
                        audio: true 
                    });
                    video.srcObject = stream;
                    btn.innerText = "DETENER ESCANEO";
                    scanning = true;
                    
                    moverSombra();
                    
                    // --- NUEVO: TEMPORIZADOR PARA LA PANTALLA ROTA ---
                    // Se ejecuta a los 30.000 milisegundos (30 segundos)
                    glitchTimeout = setTimeout(() => {
                        if (scanning) {
                            // Activa el efecto visual en todo el body
                            document.body.classList.add('glitch-active');
                            
                            // Añade un mensaje de error crítico rojo a los logs
                            logs.innerHTML = `<div><span style="color:red; font-weight:bold;">[${new Date().toLocaleTimeString()}] ERROR CRÍTICO: SEÑAL CORRUPTA</span></div>` + logs.innerHTML;
                            
                            // Temporizador para quitar el error a los 5 segundos (5000 ms)
                            setTimeout(() => {
                                document.body.classList.remove('glitch-active');
                                logs.innerHTML = `<div><span style="color:green; font-weight:bold;">[${new Date().toLocaleTimeString()}] SISTEMA RECUPERADO</span></div>` + logs.innerHTML;
                            }, 5000);
                        }
                    }, 30000); 
                    // --------------------------------------------------

                    timer = setInterval(() => {
                        const activo = esHorarioActivo();
                        const base = activo ? 35 : 5;
                        const val = (base + Math.random() * 15).toFixed(2);
                        
                        document.getElementById('emf-value').innerText = `${val} μT`;
                        
                        if(activo && val > 38) {
                            document.getElementById('radar').classList.add('radar-active');
                            logs.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ANOMALÍA: ${val} μT</div>` + logs.innerHTML;
                        } else {
                            document.getElementById('radar').classList.remove('radar-active');
                        }
                    }, 1000);
                } catch (e) { 
                    alert("Error: Cámara trasera requerida."); 
                }
            } else {
                if (stream) stream.getTracks().forEach(t => t.stop());
                clearInterval(timer);
                
                // --- NUEVO: Limpiamos el temporizador y el efecto si detenemos el escaneo ---
                clearTimeout(glitchTimeout);
                document.body.classList.remove('glitch-active');
                
                btn.innerText = "INICIAR ESCANEO";
                scanning = false;
                shadow.style.display = 'none';
            }
        });
    </script>
</body>
</html>

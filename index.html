<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EchoBound - Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; }
        .radar { border: 2px solid #00ff41; border-radius: 50%; width: 200px; height: 200px; margin: auto; position: relative; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">
    <h1 class="text-2xl font-bold mb-4">ECHOBOUND SCANNER</h1>
    <div class="radar flex items-center justify-center mb-6" id="radar">
        <span id="emf-value">0.00 μT</span>
    </div>
    <button onclick="startScan()" class="bg-green-900 border border-green-500 px-6 py-2">INICIAR ESCANEO</button>

    <script>
        function startScan() {
            setInterval(() => {
                const reading = (Math.random() * 50).toFixed(2);
                document.getElementById('emf-value').innerText = `${reading} μT`;
            }, 500);
        }
    </script>
</body>
</html>

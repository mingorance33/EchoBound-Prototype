<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoBound - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: invert(1) grayscale(1) contrast(1.2); z-index: -1; }
        .radar-active { border-color: #ff0000 !important; box-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body class="flex flex-col items-center justify-start h-screen pt-10">

    <video id="video" autoplay playsinline></video>

    <button id="btn" class="bg-green-900 border-2 border-green-500 px-8 py-3 text-lg font-bold mb-8 hover:bg-green-800 z-10">
        INICIAR ESCANEO
    </button>

    <h1 class="text-3xl font-bold mb-6">ECHOBOUND</h1>
    
    <div id="radar" class="w-64 h-64 border-4 border-green-500 rounded-full flex items-center justify-center transition-all duration-300">
        <span id="emf-value" class="text-3xl font-bold">0.00 μT</span>
    </div>

    <div id="logs" class="mt-8 text-xs h-32 overflow-y-auto w-80 border border-green-900 p-2 bg-black/50">
        > Esperando calibración...
    </div>

    <script>
        const btn = document.getElementById('btn');
        const video = document.getElementById('video');
        const emfDisplay = document.getElementById('emf-value');
        const radar = document.getElementById('radar');
        const logs = document.getElementById('logs');
        
        let scanning = false;
        let interval;

        btn.addEventListener('click', async () => {
            scanning = !scanning;
            
            if (scanning) {
                try {
                    // Forzar cámara trasera (environment)
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { exact: "environment" } }, 
                        audio: true 
                    });
                    video.srcObject = stream;
                    btn.innerText = "DETENER ESCANEO";
                    
                    interval = setInterval(() => {
                        const val = (Math.random() * 50).toFixed(2);
                        emfDisplay.innerText = `${val} μT`;
                        
                        if(val > 35) {
                            radar.classList.add('radar-active');
                            logs.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ALERTA: ${val} μT</div>` + logs.innerHTML;
                        } else {
                            radar.classList.remove('radar-active');
                        }
                    }, 800);
                } catch (err) {
                    alert("Cámara trasera no detectada o permisos denegados.");
                }
            } else {
                clearInterval(interval);
                btn.innerText = "INICIAR ESCANEO";
                radar.classList.remove('radar-active');
            }
        });
    </script>
</body>
</html>

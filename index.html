<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoBound - Detector de Precisión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsfeat/0.0.8/jsfeat-min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; filter: grayscale(1) contrast(1.2); z-index: -1; }
        .radar-active { border-color: #ff0000 !important; box-shadow: 0 0 30px #ff0000; color: #ff0000; }
        
        #canvas-process { display: none; }

        #jumpscare {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw; height: 90vw;
            background-image: url('rostro.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            z-index: 100; display: none;
            filter: contrast(4) brightness(0.5) sepia(1) hue-rotate(-50deg);
            pointer-events: none;
        }

        @keyframes scream-anim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-center">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas-process"></canvas>
    <div id="jumpscare"></div>

    <h1 class="text-3xl font-bold mb-4">ECHOBOUND SCANNER</h1>
    <div id="radar" class="w-64 h-64 border-4 border-green-500 rounded-full flex items-center justify-center mb-6">
        <span id="emf-value" class="text-3xl font-bold">INICIALIZANDO</span>
    </div>

    <button id="btn" class="bg-green-900 border border-green-500 px-10 py-4 text-xl font-bold z-10">INICIAR ESCANEO</button>
    <div id="logs" class="mt-4 text-xs h-24 overflow-y-auto w-80 border-t border-green-900 pt-2 bg-black/50"></div>

    <script>
        const btn = document.getElementById('btn');
        const jumpscare = document.getElementById('jumpscare');
        const logs = document.getElementById('logs');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas-process');
        const ctx = canvas.getContext('2d');

        let scanning = false, stream = null;
        let corners = [];
        let threshold = 20; // Sensibilidad de detección de textura

        // Inicializar array de puntos (Keypoints)
        for(let i=0; i<1000; ++i) corners[i] = new jsfeat.keypoint_t();

        function addLog(msg) {
            logs.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + logs.innerHTML;
        }

        async function procesarVideo() {
            if (!scanning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 300; // Trabajamos a baja resolución para que vuele en móvil
                canvas.height = 300;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let img_u8 = new jsfeat.matrix_t(canvas.width, canvas.height, jsfeat.U8_t | jsfeat.C1_t);
                jsfeat.imgproc.grayscale(imageData.data, canvas.width, canvas.height, img_u8);
                
                // Usamos FAST que es más estable en JSFeat
                jsfeat.fast_corners.set_threshold(threshold);
                let numCorners = jsfeat.fast_corners.detect(img_u8, corners, 3);

                // Lógica de detección: si hay muchos puntos de textura en el centro
                let puntosCentrales = 0;
                for(let i=0; i < numCorners; i++) {
                    if(corners[i].x > 100 && corners[i].x < 200 && corners[i].y > 100 && corners[i].y < 200) {
                        puntosCentrales++;
                    }
                }

                // Ajusta este número (45) según la complejidad del horno real
                if (puntosCentrales > 45) { 
                    lanzarSusto();
                }
            }
            requestAnimationFrame(procesarVideo);
        }

        function lanzarSusto() {
            if (jumpscare.style.display === 'block') return;
            
            addLog("!! PATRÓN TÉRMICO IDENTIFICADO !!");
            jumpscare.style.display = 'block';
            jumpscare.style.animation = "scream-anim 0.7s forwards";
            
            setTimeout(() => {
                jumpscare.style.display = 'none';
                jumpscare.style.animation = "none";
            }, 750);
        }

        btn.addEventListener('click', async () => {
            if (!scanning) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }
                    });
                    video.srcObject = stream;
                    btn.innerText = "DETENER";
                    scanning = true;
                    addLog("VISIÓN ACTIVA");
                    procesarVideo();
                    
                    // Simulación de EMF
                    setInterval(() => {
                        if(!scanning) return;
                        const val = (Math.random() * 40 + 5).toFixed(2);
                        document.getElementById('emf-value').innerText = `${val} μT`;
                    }, 1000);

                } catch (e) { addLog("ERROR: CÁMARA NO DISPONIBLE"); }
            } else {
                location.reload(); // Reinicio limpio
            }
        });

        window.onload = () => {
            document.getElementById('emf-value').innerText = "0.00 μT";
            addLog("SISTEMA LISTO");
        };
    </script>
</body>
</html>
